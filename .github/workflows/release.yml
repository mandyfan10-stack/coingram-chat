name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'

jobs:
  validate:
    name: Validate and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag and package versions
        run: npm run release:verify -- "$GITHUB_REF_NAME"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web client
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  android:
    name: Build signed Android APK
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Capacitor
        run: |
          npm run build
          npm run cap:sync

      - name: Restore Android signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/coingram-release.p12"
          test -s "$RUNNER_TEMP/coingram-release.p12"
          chmod 600 "$RUNNER_TEMP/coingram-release.p12"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/coingram-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify and package APK
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose android/app/build/outputs/apk/release/app-release.apk
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/CoinGram-${VERSION}-android.apk"
          sha256sum "release/CoinGram-${VERSION}-android.apk"

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-release
          path: release/*.apk
          if-no-files-found: error
          retention-days: 30

  windows:
    name: Build Windows installer
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run electron:build

      - name: Package installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $source = "dist-electron\CoinGram Setup $version.exe"
          if (-not (Test-Path -LiteralPath $source)) { throw "Installer not found: $source" }
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $target = "release\CoinGram-Setup-$version.exe"
          Copy-Item -LiteralPath $source -Destination $target
          Get-FileHash -Algorithm SHA256 -LiteralPath $target

      - name: Upload Windows installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: dist

      - name: Configure deployment identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx gh-pages -t -d dist
          -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

  publish:
    name: Publish GitHub Release
    needs:
      - android
      - windows
      - deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*-release'
          path: release-assets
          merge-multiple: true

      - name: Publish assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -lh release-assets
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "CoinGram $GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi